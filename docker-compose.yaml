services:
  api:
    build:
      # Den mappen vi står i
      context: .
      # Finner du dockerfilen slik
      dockerfile: TaskService.Api/Dockerfile

    ports:
      # Localhost 8080 maps til container 80
      - "8080:80"

    depends_on:
      # Sørger for at databasen starter før API-et
      - db

    environment:
      - ConnectionStrings__Default=Host=db;Port=5432;Database=tasks;Username=postgres;Password=postgres

  db:
    # Henter ferdig database image fra Docker hub
    image: postgres:18

    environment:
      # Navnet på databasen som opprettes automatisk
      POSTGRES_DB: tasks

      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      # localhost 5432 maps til container 5432
      - "5432:5432"

  pgadmin:
    image: dpage/pgadmin4

    ports:
      - "5050:80"

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
